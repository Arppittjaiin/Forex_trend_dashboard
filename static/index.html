<!DOCTYPE html>
<html>

<head>
    <title>Forex Analysis Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto Mono', 'Courier New', monospace;
            background-color: #000000;
            color: #FFA500;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .main-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .main-header h1 {
            color: #FFA500;
            font-weight: 700;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin: 0;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            background-color: #000000;
            justify-content: flex-start;
            border-bottom: 2px solid #333;
            margin-bottom: 20px;
        }

        .tab {
            height: 40px;
            background-color: #111;
            color: #888;
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            padding: 5px 20px;
            border: 1px solid #333;
            border-bottom: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            user-select: none;
        }

        .tab.active {
            background-color: #000000;
            color: #FFA500;
            border: 1px solid #FFA500;
            border-bottom: 2px solid #000;
            margin-bottom: -2px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Board Styles */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .title-box {
            background-color: #000;
            padding: 5px 15px;
            border: 1px solid #FFA500;
            color: #FFA500;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 6px 15px;
            background-color: #000;
            border: 1px solid #555;
            color: #CCC;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Roboto Mono', monospace;
            transition: all 0.2s;
            font-size: 0.8rem;
        }

        .save-btn {
            border-color: #00FF00;
            color: #00FF00;
        }

        .reset-btn {
            border-color: #FF0000;
            color: #FF0000;
        }

        .save-btn:hover {
            background-color: #003300;
        }

        .reset-btn:hover {
            background-color: #330000;
        }

        /* Bench */
        .bench-label {
            color: #888;
            font-weight: 700;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .bench-container {
            background: #050505;
            padding: 10px;
            border: 1px solid #333;
            min-height: 80px;
            margin-bottom: 20px;
        }

        .currency-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 60px;
        }

        /* Cards */
        .currency-card {
            width: 90px;
            background: #000;
            border: 1px solid #444;
            overflow: hidden;
            cursor: grab;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            background-color: #111;
            color: #FFA500;
            text-align: center;
            font-weight: 700;
            padding: 4px;
            font-size: 0.9rem;
            border-bottom: 1px solid #444;
        }

        .card-body {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .card-body img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) contrast(120%);
        }

        /* Dashboard */
        .board {
            display: flex;
            justify-content: space-between;
            gap: 4px;
            margin-bottom: 15px;
        }

        .column-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .drop-zone {
            flex-grow: 1;
            min-height: 350px;
            display: flex;
            flex-direction: column-reverse;
            /* Bottom-up stacking */
            gap: 5px;
            padding: 8px;
            background: #050505;
            border: 1px solid #333;
        }

        /* Scale Bar */
        .scale-bar {
            display: flex;
            width: 100%;
            height: 40px;
            border: 1px solid #555;
            background: #111;
            gap: 1px;
        }

        .scale-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: #000;
            background: #333;
        }

        .n3 {
            background: #FF0000;
            color: #fff;
        }

        .n2 {
            background: #CC0000;
            color: #fff;
        }

        .n1 {
            background: #990000;
            color: #fff;
        }

        .zero {
            background: #888888;
            color: #fff;
        }

        .p1 {
            background: #006600;
            color: #fff;
        }

        .p2 {
            background: #009900;
            color: #fff;
        }

        .p3 {
            background: #00FF00;
            color: #000;
        }

        .sortable-ghost {
            opacity: 0.4;
            outline: 1px dashed #FFA500;
        }

        /* Modal & Toast */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .confirm-box {
            background: #000;
            padding: 20px;
            border: 1px solid #FFA500;
            color: #FFA500;
            text-align: center;
            width: 300px;
            font-family: 'Roboto Mono', monospace;
        }

        .confirm-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .confirm-btn {
            padding: 5px 15px;
            border: 1px solid #555;
            background: #111;
            color: #CCC;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Roboto Mono', monospace;
        }

        .yes-btn {
            border-color: #FFA500;
            color: #FFA500;
        }

        .yes-btn:hover {
            background: #332000;
        }

        .no-btn:hover {
            background: #333;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: #00FF00;
            padding: 10px 20px;
            border: 1px solid #00FF00;
            font-weight: 700;
            display: none;
            z-index: 2000;
            font-family: 'Roboto Mono', monospace;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }
    </style>
</head>

<body>

    <div class="main-header">
        <h1>TERMINAL FX // ANALYSIS</h1>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(event, 'trend')">[ TREND SCORE ]</div>
        <div class="tab" onclick="switchTab(event, 'velocity')">[ VELOCITY SCORE ]</div>
    </div>

    <div id="tab-trend" class="tab-content active"></div>
    <div id="tab-velocity" class="tab-content"></div>

    <div id="overlay" class="overlay">
        <div class="confirm-box">
            <h3 id="confirm-title">Confirm</h3>
            <p id="confirm-msg">Proceed?</p>
            <div class="confirm-actions">
                <button class="confirm-btn yes-btn" onclick="proceed()">Yes</button>
                <button class="confirm-btn no-btn" onclick="closeConfirm()">Cancel</button>
            </div>
        </div>
    </div>
    <div id="toast" class="toast">Saved!</div>

    <script>
        const CURRENCIES = {
            "CAD": { flag: "https://flagcdn.com/w320/ca.png", label: "CAD" },
            "EUR": { flag: "https://flagcdn.com/w320/eu.png", label: "EUR" },
            "CHF": { flag: "https://flagcdn.com/w320/ch.png", label: "CHF" },
            "JPY": { flag: "https://flagcdn.com/w320/jp.png", label: "JPY" },
            "NZD": { flag: "https://flagcdn.com/w320/nz.png", label: "NZD" },
            "USD": { flag: "https://flagcdn.com/w320/us.png", label: "USD" },
            "GBP": { flag: "https://flagcdn.com/w320/gb.png", label: "GBP" },
            "AUD": { flag: "https://flagcdn.com/w320/au.png", label: "AUD" },
        };

        const boards = {
            'trend': { title: 'Trend Score', key: 'forex_trend_placements' },
            'velocity': { title: 'Velocity Score', key: 'forex_velocity_placements' }
        };

        const containers = {};
        let pendingAction = null;
        let activeBoardId = null;

        function switchTab(event, tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));

            event.currentTarget.classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        function createCard(id) {
            const data = CURRENCIES[id];
            const div = document.createElement('div');
            div.className = 'currency-card';
            div.dataset.id = id;
            div.innerHTML = `<div class="card-header">${data.label}</div><div class="card-body"><img src="${data.flag}"></div>`;
            return div;
        }

        function renderBoardHTML(id) {
            const b = boards[id];
            return `
                <div class="header-bar">
                    <div class="title-box">${b.title}</div>
                    <div class="btn-group">
                        <button class="action-btn reset-btn" onclick="showConfirm('${id}', 'reset')">Reset</button>
                        <button class="action-btn save-btn" onclick="showConfirm('${id}', 'save')">Save ${b.title}</button>
                    </div>
                </div>

                <div class="bench-label">Currency Bench</div>
                <div class="bench-container"><div id="${id}-bench" class="currency-list"></div></div>

                <div class="board">
                    <div class="column-wrapper"><div id="${id}-col-n3" class="drop-zone"></div></div>
                    <div class="column-wrapper"><div id="${id}-col-n2" class="drop-zone"></div></div>
                    <div class="column-wrapper"><div id="${id}-col-n1" class="drop-zone"></div></div>
                    <div class="column-wrapper"><div id="${id}-col-0" class="drop-zone"></div></div>
                    <div class="column-wrapper"><div id="${id}-col-p1" class="drop-zone"></div></div>
                    <div class="column-wrapper"><div id="${id}-col-p2" class="drop-zone"></div></div>
                    <div class="column-wrapper"><div id="${id}-col-p3" class="drop-zone"></div></div>
                </div>

                <div class="scale-bar">
                    <div class="scale-item n3">-3</div><div class="scale-item n2">-2</div><div class="scale-item n1">-1</div>
                    <div class="scale-item zero">0</div><div class="scale-item p1">+1</div><div class="scale-item p2">+2</div><div class="scale-item p3">+3</div>
                </div>
            `;
        }

        function initBoard(id) {
            document.getElementById('tab-' + id).innerHTML = renderBoardHTML(id);

            const bKey = boards[id].key;
            const saved = localStorage.getItem(bKey);
            const state = saved ? JSON.parse(saved) : {
                "bench": ["CAD", "EUR", "CHF", "JPY", "NZD", "USD", "GBP", "AUD"],
                "-3": [], "-2": [], "-1": [], "0": [], "1": [], "2": [], "3": []
            };

            containers[id] = {
                'bench': document.getElementById(`${id}-bench`),
                '-3': document.getElementById(`${id}-col-n3`),
                '-2': document.getElementById(`${id}-col-n2`),
                '-1': document.getElementById(`${id}-col-n1`),
                '0': document.getElementById(`${id}-col-0`),
                '1': document.getElementById(`${id}-col-p1`),
                '2': document.getElementById(`${id}-col-p2`),
                '3': document.getElementById(`${id}-col-p3`)
            };

            Object.keys(state).forEach(key => {
                const container = containers[id][key];
                if (container) state[key].forEach(cid => container.appendChild(createCard(cid)));
            });

            // Initialize Sortable for each zone in this board
            Object.values(containers[id]).forEach(container => {
                new Sortable(container, { group: `shared-${id}`, animation: 150, ghostClass: 'sortable-ghost' });
            });
        }

        function saveBoard(id) {
            const state = {};
            Object.keys(containers[id]).forEach(key => {
                state[key] = Array.from(containers[id][key].children).map(c => c.dataset.id);
            });
            localStorage.setItem(boards[id].key, JSON.stringify(state));
            showToast("✅ " + boards[id].title + " Saved!");
        }

        function showConfirm(id, action) {
            activeBoardId = id;
            pendingAction = action;
            const title = boards[id].title;
            document.getElementById('confirm-title').innerText = action === 'save' ? `Save ${title}?` : 'Reset Board?';
            document.getElementById('confirm-msg').innerText = action === 'save' ? 'Save current positions?' : 'Clear all memory for this tab?';
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeConfirm() { document.getElementById('overlay').style.display = 'none'; }

        function proceed() {
            if (pendingAction === 'save') {
                saveBoard(activeBoardId);
            } else if (pendingAction === 'reset') {
                localStorage.removeItem(boards[activeBoardId].key);
                location.reload();
            }
            closeConfirm();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        initBoard('trend');
        initBoard('velocity');
    </script>
</body>

</html>
